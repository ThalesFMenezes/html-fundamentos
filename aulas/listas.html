<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Listas ordenadas e não ordenadas</title>
    </head>
    <body>
        <!--
        ul = lista nao ordenada, ou seja, so pontos antes dos li  <ul> </ul>
        ol = lista ordenada  <ol> </ol>
        li = item da lista, segue depois do ul ou ol
        types de ul = circle, disc, square e none
        type de ol = 1, A, a, I, i
        -->

        <h2>base da programação que quero estudar</h2>
        <ul type="circle">
            <li>html</li>
        </ul>
        <ul type="disc">
            <li>css</li>
        </ul>
        <ul type="square">
            <li>javascript</li>
        </ul>

        <h3>Conteúdo do curso</h3>
        <ol style="list-style-type:I"> 
            <li>Introdução</li> 
            <li>Desenvolvimento</li> 
            <li>Conclusão</li> 
        </ol>
    </body>
</html>
